name: Update PTT IP Index

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm test

      - run: npm run queue:import
        env:
          PTT_INDEX_QUEUE_URL: ${{ secrets.PTT_INDEX_QUEUE_URL }}
          PTT_INDEX_QUEUE_TOKEN: ${{ secrets.PTT_INDEX_QUEUE_TOKEN }}

      - run: npm run index:users
        env:
          PTT_INDEX_BATCH_SIZE: "2"
          PTT_INDEX_PER_USER_LIMIT: "25"

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ip-index.json data/index-state.json
          if git diff --cached --quiet; then
            echo "No index changes"
          else
            git commit -m "chore: update ptt ip index"
            git push
          fi
